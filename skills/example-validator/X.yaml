skill: example-validator
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical

harness:
  cases:
    - name: passes_above_threshold
      runner: default
      inputs:
        score: 85
        threshold: 70
      expect:
        status: sealed

    - name: fails_below_threshold
      runner: default
      inputs:
        score: 45
        threshold: 60
      expect:
        status: sealed

    - name: missing_required_score
      runner: default
      inputs:
        threshold: 70
      expect:
        status: stopped

runners:
  default:
    default: true
    type: cli-tool
    command: python
    args:
      - run.py
    artifacts:
      named_emits:
        verdict: verdict
    inputs:
      score:
        type: integer
        description: The score to validate
        required: true
      threshold:
        type: integer
        description: Minimum passing score
        required: false
